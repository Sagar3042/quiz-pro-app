name: Build Android APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v3
        with: { node-version: '18' }
        
      - name: Install Stable Dependencies (v5)
        run: |
          npm install -g @capacitor/cli@5
          npm install @capacitor/core@5 @capacitor/android@5 @codetrix-studio/capacitor-google-auth@3.3.4
          
      - name: Build Fresh Capacitor Android
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android
          
      - name: Inject Google Auth & Fingerprint Magic
        run: |
          # 1. Add Web Client ID
          sed -i '/<\/resources>/i \    <string name="server_client_id">868116455420-tlvb6b74tnq57vu3lorrng8bf41bjmrl.apps.googleusercontent.com</string>' android/app/src/main/res/values/strings.xml
          
          # 2. Copy google-services.json
          cp google-services.json android/app/
          
          # 3. Tell Android to READ the JSON file
          sed -i '0,/dependencies {/s/dependencies {/dependencies {\n        classpath "com.google.gms:google-services:4.4.0"/' android/build.gradle
          echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
          
          # 4. FIX: Download valid debug.keystore from a LOCKED PAST VERSION (Never changes)
          mkdir -p ~/.android
          curl -f -L -o ~/.android/debug.keystore https://raw.githubusercontent.com/facebook/react-native/v0.70.0/template/android/app/debug.keystore
          
      - uses: actions/setup-java@v3
        with: 
          distribution: 'zulu'
          java-version: '17'
        
      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug
        
      - uses: actions/upload-artifact@v4
        with:
          name: Quiz-Pro-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
